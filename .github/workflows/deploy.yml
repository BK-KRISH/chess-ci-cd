name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo yum install git -y
            sudo systemctl start docker || sudo service docker start

            rm -rf devops-project
            git clone https://github.com/BK-KRISH/chess-devops.git

            cd devops-project/app

            docker stop bk-app || true
            docker rm bk-app || true

            docker build -t bk-app .
            docker run -d -p 80:80 bk-app